<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Guide</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

body{

    margin:0;
    background:#eef3f8;
    font-family:"Segoe UI",sans-serif;

}

header{

    background:linear-gradient(135deg,#0f4c81,#2196f3);

    color:white;

    padding:18px;

    display:flex;

    justify-content:center;

    align-items:center;

    position:sticky;

    top:0;

}

.back-btn{

    position:absolute;

    left:25px;

    color:white;

    text-decoration:none;

    font-size:18px;

}

.back-btn:hover{

    opacity:.8;

}

.guide-container{

    max-width:1400px;

    margin:30px auto;

    padding:20px;

}

.guide-container img{

    width:100%;

    border-radius:12px;

    box-shadow:0 10px 30px rgba(0,0,0,.2);

}

</style>

</head>

<body>

<header>

<a href="index.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>
 Back

</a>

<h2>User Guide</h2>

</header>

<div class="guide-container">

<img src="guide.png" alt="User Guide">

</div>

</body>

</html>
